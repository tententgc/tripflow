# Local dev / smoke-testing the same Docker images that ship to Render.
# Usage:
#   docker compose up --build         # build + run web + admin
#   docker compose up web             # only traveler PWA
#   docker compose down -v            # stop + drop volumes
#
# Env vars are loaded from `.env` (same file the local `./start.sh` uses).
# Secrets stay in `.env`; this file should not contain any.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: tripflow-web:local
    container_name: tripflow-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: tripflow-admin:local
    container_name: tripflow-admin
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_TELEMETRY_DISABLED: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
